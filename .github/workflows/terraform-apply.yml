name: Terraform

on:
  push:
    branches:
      - master
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

  pull_request:
    branches:
      - master
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
  TF_VAR_region: ${{ vars.GCP_REGION }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

jobs:
  terraform-plan:
    name: Terraform plan
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: terraform/envs/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Debug Google auth
        working-directory: .
        run: |
          set -euo pipefail

          echo "===== GitHub context ====="
          echo "Repository: ${{ github.repository }}"
          echo "Ref name:   ${{ github.ref_name }}"
          echo "Event:      ${{ github.event_name }}"
          echo

          echo "===== GitHub Variables ====="
          echo "GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}"
          echo "GCP_REGION=${{ vars.GCP_REGION }}"
          echo "GCP_SERVICE_ACCOUNT=${{ vars.GCP_SERVICE_ACCOUNT }}"
          echo "GCP_WORKLOAD_IDENTITY_PROVIDER=${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}"
          echo

          echo "===== Terraform variables ====="
          test -n "${TF_VAR_project_id}" || (echo "ERROR: TF_VAR_project_id is empty" && exit 1)
          test -n "${TF_VAR_region}" || (echo "ERROR: TF_VAR_region is empty" && exit 1)
          test -n "${TF_VAR_db_password}" || (echo "ERROR: TF_VAR_db_password is empty" && exit 1)
          echo "TF_VAR_project_id is set"
          echo "TF_VAR_region is set"
          echo "TF_VAR_db_password is set"
          echo

          echo "===== gcloud auth ====="
          gcloud auth list
          echo

          echo "Active account:"
          gcloud config get-value account || true
          echo

          echo "Project config:"
          gcloud config get-value project || true
          echo

          echo "===== State bucket access test ====="
          STATE_BUCKET="${{ vars.TF_STATE_BUCKET }}"
          if [[ -z "${STATE_BUCKET}" ]]; then
            STATE_BUCKET="${{ vars.GCP_PROJECT_ID }}-terraform-state"
          fi

          echo "STATE_BUCKET=${STATE_BUCKET}"
          gcloud storage ls "gs://${STATE_BUCKET}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Show Terraform plan
        run: terraform show -no-color tfplan

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-dev-tfplan
          path: terraform/envs/dev/tfplan
          retention-days: 1

  terraform-apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: terraform-plan

    if: ${{ github.event_name == 'workflow_dispatch' }}

    environment:
      name: dev

    defaults:
      run:
        shell: bash
        working-directory: terraform/envs/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Debug Google auth before apply
        working-directory: .
        run: |
          set -euo pipefail

          echo "===== GitHub context ====="
          echo "Repository: ${{ github.repository }}"
          echo "Ref name:   ${{ github.ref_name }}"
          echo "Event:      ${{ github.event_name }}"
          echo

          echo "===== GitHub Variables ====="
          echo "GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}"
          echo "GCP_REGION=${{ vars.GCP_REGION }}"
          echo "GCP_SERVICE_ACCOUNT=${{ vars.GCP_SERVICE_ACCOUNT }}"
          echo "GCP_WORKLOAD_IDENTITY_PROVIDER=${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}"
          echo

          echo "===== Terraform variables ====="
          test -n "${TF_VAR_project_id}" || (echo "ERROR: TF_VAR_project_id is empty" && exit 1)
          test -n "${TF_VAR_region}" || (echo "ERROR: TF_VAR_region is empty" && exit 1)
          test -n "${TF_VAR_db_password}" || (echo "ERROR: TF_VAR_db_password is empty" && exit 1)
          echo "TF_VAR_project_id is set"
          echo "TF_VAR_region is set"
          echo "TF_VAR_db_password is set"
          echo

          echo "===== gcloud auth ====="
          gcloud auth list
          echo

          echo "Active account:"
          gcloud config get-value account || true
          echo

          echo "Project config:"
          gcloud config get-value project || true
          echo

          echo "===== State bucket access test ====="
          STATE_BUCKET="${{ vars.TF_STATE_BUCKET }}"
          if [[ -z "${STATE_BUCKET}" ]]; then
            STATE_BUCKET="${{ vars.GCP_PROJECT_ID }}-terraform-state"
          fi

          echo "STATE_BUCKET=${STATE_BUCKET}"
          gcloud storage ls "gs://${STATE_BUCKET}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-dev-tfplan
          path: terraform/envs/dev

      - name: Terraform apply approved plan
        run: terraform apply -input=false -auto-approve tfplan