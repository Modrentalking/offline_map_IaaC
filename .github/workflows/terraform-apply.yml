name: Terraform

on:
  push:
    branches:
      - master
    paths:
      - "terraform/envs/dev/**"
      - ".github/workflows/terraform.yml"

  pull_request:
    branches:
      - master
    paths:
      - "terraform/envs/dev/**"
      - ".github/workflows/terraform.yml"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

jobs:
  terraform-plan:
    name: Terraform plan
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: terraform/envs/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize GitHub variables
        id: ci_vars
        working-directory: .
        run: |
          set -euo pipefail

          PROJECT_ID="$(printf '%s' '${{ vars.GCP_PROJECT_ID }}' | tr -d '\r\n[:space:]')"
          REGION="$(printf '%s' '${{ vars.GCP_REGION }}' | tr -d '\r\n[:space:]')"
          SERVICE_ACCOUNT="$(printf '%s' '${{ vars.GCP_SERVICE_ACCOUNT }}' | tr -d '\r\n[:space:]')"
          WIF_PROVIDER="$(printf '%s' '${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}' | tr -d '\r\n[:space:]')"
          STATE_BUCKET="$(printf '%s' '${{ vars.TF_STATE_BUCKET }}' | tr -d '\r\n[:space:]')"

          test -n "${PROJECT_ID}" || (echo "GCP_PROJECT_ID is empty" && exit 1)
          test -n "${REGION}" || (echo "GCP_REGION is empty" && exit 1)
          test -n "${SERVICE_ACCOUNT}" || (echo "GCP_SERVICE_ACCOUNT is empty" && exit 1)
          test -n "${WIF_PROVIDER}" || (echo "GCP_WORKLOAD_IDENTITY_PROVIDER is empty" && exit 1)
          test -n "${STATE_BUCKET}" || (echo "TF_STATE_BUCKET is empty" && exit 1)
          test -n "${TF_VAR_db_password}" || (echo "DB_PASSWORD secret is empty" && exit 1)

          echo "project_id=${PROJECT_ID}" >> "$GITHUB_OUTPUT"
          echo "region=${REGION}" >> "$GITHUB_OUTPUT"
          echo "service_account=${SERVICE_ACCOUNT}" >> "$GITHUB_OUTPUT"
          echo "wif_provider=${WIF_PROVIDER}" >> "$GITHUB_OUTPUT"
          echo "state_bucket=${STATE_BUCKET}" >> "$GITHUB_OUTPUT"

          echo "TF_VAR_project_id=${PROJECT_ID}" >> "$GITHUB_ENV"
          echo "TF_VAR_region=${REGION}" >> "$GITHUB_ENV"

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ steps.ci_vars.outputs.project_id }}
          workload_identity_provider: ${{ steps.ci_vars.outputs.wif_provider }}
          service_account: ${{ steps.ci_vars.outputs.service_account }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Debug Google auth
        working-directory: .
        run: |
          set -euo pipefail

          echo "Repository: ${{ github.repository }}"
          echo "Branch:     ${{ github.ref_name }}"
          echo "Event:      ${{ github.event_name }}"
          echo
          echo "Project:    ${{ steps.ci_vars.outputs.project_id }}"
          echo "Region:     ${{ steps.ci_vars.outputs.region }}"
          echo "Expected SA:${{ steps.ci_vars.outputs.service_account }}"
          echo

          gcloud auth list
          echo

          echo "Check Terraform state bucket:"
          gcloud storage ls "gs://${{ steps.ci_vars.outputs.state_bucket }}"

      - name: Check forbidden files
        working-directory: .
        run: |
          set -euo pipefail

          forbidden_files="$(git ls-files | grep -E '\.env$|\.pbf$|\.pmtiles$|\.mbtiles$|terraform\.tfstate|terraform\.tfvars|init/dist/.+' | grep -v '^init/dist/.gitkeep$' || true)"

          if [[ -n "${forbidden_files}" ]]; then
            echo "Forbidden files found:"
            echo "${forbidden_files}"
            exit 1
          fi

          echo "OK"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Show Terraform plan
        run: terraform show -no-color tfplan

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-dev-tfplan
          path: terraform/envs/dev/tfplan
          retention-days: 1

  terraform-apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: terraform-plan

    if: ${{ github.event_name == 'workflow_dispatch' }}

    environment:
      name: dev

    defaults:
      run:
        shell: bash
        working-directory: terraform/envs/dev

    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize GitHub variables
        id: ci_vars
        working-directory: .
        run: |
          set -euo pipefail

          PROJECT_ID="$(printf '%s' '${{ vars.GCP_PROJECT_ID }}' | tr -d '\r\n[:space:]')"
          REGION="$(printf '%s' '${{ vars.GCP_REGION }}' | tr -d '\r\n[:space:]')"
          SERVICE_ACCOUNT="$(printf '%s' '${{ vars.GCP_SERVICE_ACCOUNT }}' | tr -d '\r\n[:space:]')"
          WIF_PROVIDER="$(printf '%s' '${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}' | tr -d '\r\n[:space:]')"
          STATE_BUCKET="$(printf '%s' '${{ vars.TF_STATE_BUCKET }}' | tr -d '\r\n[:space:]')"

          test -n "${PROJECT_ID}" || (echo "GCP_PROJECT_ID is empty" && exit 1)
          test -n "${REGION}" || (echo "GCP_REGION is empty" && exit 1)
          test -n "${SERVICE_ACCOUNT}" || (echo "GCP_SERVICE_ACCOUNT is empty" && exit 1)
          test -n "${WIF_PROVIDER}" || (echo "GCP_WORKLOAD_IDENTITY_PROVIDER is empty" && exit 1)
          test -n "${STATE_BUCKET}" || (echo "TF_STATE_BUCKET is empty" && exit 1)
          test -n "${TF_VAR_db_password}" || (echo "DB_PASSWORD secret is empty" && exit 1)

          echo "project_id=${PROJECT_ID}" >> "$GITHUB_OUTPUT"
          echo "region=${REGION}" >> "$GITHUB_OUTPUT"
          echo "service_account=${SERVICE_ACCOUNT}" >> "$GITHUB_OUTPUT"
          echo "wif_provider=${WIF_PROVIDER}" >> "$GITHUB_OUTPUT"
          echo "state_bucket=${STATE_BUCKET}" >> "$GITHUB_OUTPUT"

          echo "TF_VAR_project_id=${PROJECT_ID}" >> "$GITHUB_ENV"
          echo "TF_VAR_region=${REGION}" >> "$GITHUB_ENV"

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ steps.ci_vars.outputs.project_id }}
          workload_identity_provider: ${{ steps.ci_vars.outputs.wif_provider }}
          service_account: ${{ steps.ci_vars.outputs.service_account }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Debug Google auth before apply
        working-directory: .
        run: |
          set -euo pipefail

          echo "Project:    ${{ steps.ci_vars.outputs.project_id }}"
          echo "Expected SA:${{ steps.ci_vars.outputs.service_account }}"
          echo

          gcloud auth list
          echo

          echo "Check Terraform state bucket:"
          gcloud storage ls "gs://${{ steps.ci_vars.outputs.state_bucket }}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-dev-tfplan
          path: terraform/envs/dev

      - name: Terraform apply approved plan
        run: terraform apply -input=false -auto-approve tfplan