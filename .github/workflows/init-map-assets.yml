name: Init Map Assets

on:
  workflow_dispatch:
    inputs:
      confirm_init:
        description: "Type INIT to confirm map assets initialization"
        required: true
        type: string

      force_download_pbf:
        description: "Force fresh Belarus PBF download"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      allow_republish:
        description: "Allow republish if manifest.json already exists"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

env:
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

jobs:
  init-map-assets:
    name: Build and publish map assets
    runs-on: ubuntu-latest

    if: ${{ inputs.confirm_init == 'INIT' }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize GitHub variables
        id: ci_vars
        run: |
          set -euo pipefail

          PROJECT_ID="$(printf '%s' '${{ vars.GCP_PROJECT_ID }}' | tr -d '\r\n[:space:]')"
          REGION="$(printf '%s' '${{ vars.GCP_REGION }}' | tr -d '\r\n[:space:]')"
          SERVICE_ACCOUNT="$(printf '%s' '${{ vars.GCP_SERVICE_ACCOUNT }}' | tr -d '\r\n[:space:]')"
          WIF_PROVIDER="$(printf '%s' '${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}' | tr -d '\r\n[:space:]')"
          STATE_BUCKET="$(printf '%s' '${{ vars.TF_STATE_BUCKET }}' | tr -d '\r\n[:space:]')"

          test -n "${PROJECT_ID}" || (echo "GCP_PROJECT_ID is empty" && exit 1)
          test -n "${REGION}" || (echo "GCP_REGION is empty" && exit 1)
          test -n "${SERVICE_ACCOUNT}" || (echo "GCP_SERVICE_ACCOUNT is empty" && exit 1)
          test -n "${WIF_PROVIDER}" || (echo "GCP_WORKLOAD_IDENTITY_PROVIDER is empty" && exit 1)
          test -n "${STATE_BUCKET}" || (echo "TF_STATE_BUCKET is empty" && exit 1)

          echo "project_id=${PROJECT_ID}" >> "$GITHUB_OUTPUT"
          echo "region=${REGION}" >> "$GITHUB_OUTPUT"
          echo "service_account=${SERVICE_ACCOUNT}" >> "$GITHUB_OUTPUT"
          echo "wif_provider=${WIF_PROVIDER}" >> "$GITHUB_OUTPUT"
          echo "state_bucket=${STATE_BUCKET}" >> "$GITHUB_OUTPUT"

          echo "TF_VAR_project_id=${PROJECT_ID}" >> "$GITHUB_ENV"
          echo "TF_VAR_region=${REGION}" >> "$GITHUB_ENV"

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ steps.ci_vars.outputs.project_id }}
          workload_identity_provider: ${{ steps.ci_vars.outputs.wif_provider }}
          service_account: ${{ steps.ci_vars.outputs.service_account }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform/envs/dev
        run: terraform init -input=false

      - name: Generate .env from Terraform outputs
        run: ./init/generate-env-from-terraform.sh

      - name: Show generated init config
        run: |
          set -euo pipefail
          source .env

          echo "PROJECT_ID=${PROJECT_ID}"
          echo "REGION=${REGION}"
          echo "MAP_BUCKET=${MAP_BUCKET}"
          echo "PUBLISHER_SA=${PUBLISHER_SA}"
          echo "PMTILES_URL=${PMTILES_URL}"
          echo "STYLE_URL=${STYLE_URL}"
          echo "MANIFEST_URL=${MANIFEST_URL}"

      - name: Check if init already published
        run: |
          set -euo pipefail
          source .env

          if gcloud storage ls "gs://${MAP_BUCKET}/manifest.json" >/dev/null 2>&1; then
            echo "manifest.json already exists in gs://${MAP_BUCKET}/manifest.json"

            if [[ "${{ inputs.allow_republish }}" != "true" ]]; then
              echo "Init already appears to be published."
              echo "Re-run with allow_republish=true if you really want to publish again."
              exit 1
            fi

            echo "allow_republish=true, continuing..."
          else
            echo "No manifest.json found, continuing first init..."
          fi

      - name: Fetch map assets
        run: ./init/fetch-map-assets-from-github.sh

      - name: Build PMTiles
        env:
          FORCE_DOWNLOAD_PBF: ${{ inputs.force_download_pbf }}
        run: ./init/build-map.sh

      - name: Publish map assets to GCS
        run: ./init/publish-map-assets.sh

      - name: Verify published assets
        run: |
          set -euo pipefail
          source .env

          echo "Checking style:"
          curl -I "${STYLE_URL}"

          echo "Checking PMTiles Range:"
          curl -H "Range: bytes=0-1023" -I "${PMTILES_URL}"

      - name: Summary
        if: always()
        run: |
          echo "## Init Map Assets" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ -f ".env" ]]; then
            source .env
            echo "- Bucket: \`${MAP_BUCKET}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- PMTiles: \`${PMTILES_URL}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Style: \`${STYLE_URL}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Manifest: \`${MANIFEST_URL}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- .env was not generated" >> "$GITHUB_STEP_SUMMARY"
          fi